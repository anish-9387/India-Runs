# ============================================================================
# AI tools declaration  (transparency only — not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"            # architecture design, code review, EDA scripting
ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, calibrating honeypot
  thresholds from the data distribution, code review, and documentation. All
  ranking logic is rules-based and runs locally; no candidate data is sent to
  any LLM at ranking time, and the reasoning column is assembled from candidate
  fields with no generative step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid unsupervised ranker (no labels in the data). final =
  (0.62*structured_fit + 0.38*semantic) * behavioral_modifier * honeypot_gate.
  structured_fit scores role-title match and domain evidence read from free-text
  CAREER DESCRIPTIONS (not the skills array) — the decisive defense against
  keyword-stuffers — plus product-vs-services, experience band, location and
  GitHub validation, minus penalties for the JD's explicit non-fits. The
  semantic channel is a TF-IDF cosine to a JD ideal-profile query (optionally
  RRF-fused with model2vec dense embeddings) that catches strong candidates who
  avoid buzzwords. A multiplicative behavioral modifier down-weights inactive /
  unresponsive profiles. Honeypots are gated using internal-consistency checks
  calibrated to the data distribution (0% in the top-100). Reasoning is assembled
  from real fields only — hallucination-free by construction. Runtime ~52s for
  100k candidates on CPU, ~1.5 GB RAM.

